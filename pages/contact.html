<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contactez nous</title>
        <link href="/asset/css/general.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    </head>
    <body>
        
        <div id="header"></div>
        
        <main>
            <section class="container my-5 text-center">
                <h2 class="mb-4">Nos coordonnées</h2>
                <span><a href="tel" target="_blank"><i class="bi bi-telephone"></i> 06 78 69 66 86</a></span>
                <br>
                <span> <i class="bi bi-geo-alt"></i> 14 Rue du Thou Saint-Paul-de-Varax, France</span>
                <br>
                <div class="container mb-5">
                    <iframe
                        src="https://www.google.com/maps?q=Saint+Paul+de+Varax&output=embed"
                        width="100%"
                        height="300"
                        style="border:0;"
                        loading="lazy">
                    </iframe>
                </div>
                <span>
                    <a href="https://www.facebook.com/people/FM-abattage" target="_blank">
                    <i class="bi bi-facebook"></i>
                    </a>
                </span>
            </section>
            <section class="container my-5">
                <h2 class="mb-4 text-center">Contactez-nous</h2>
                <p>
                    N'hésitez pas à nous contacter pour tout devis ou question. Nous serons ravis de vous aider dans vos projets de jardinage.
                </p>
                <form action="#" method="post" class="mx-auto" style="max-width:600px;">

                    <div class="mb-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input id="nom" type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                    <label for="mail" class="form-label">Email</label>
                    <input id="mail" type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="text-center">
                    <button class="btn btn-primary px-4">Envoyer</button>
                    </div>
                </form>
            </section>
        </main>

        <div id="footer"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            fetch("/pages/composant/header.html")
            .then(res => res.text())
            .then(data => document.getElementById("header").innerHTML = data);

            fetch("/pages/composant/footer.html")
            .then(res => res.text())
            .then(data => document.getElementById("footer").innerHTML = data);
        </script>
    </body>
</html>
